services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: trading_assistant
      POSTGRES_USER: trading_assistant
      POSTGRES_PASSWORD: trading_assistant
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  redis:
    image: redis:7
    ports:
      - "6379:6379"
volumes:
  postgres_data:
